<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password — Elinno Agent</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="/auth.css" />
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <p class="auth-eyebrow">Elinno Agent</p>
      <span class="auth-eyebrow-line"></span>
      <h1 class="auth-heading">Forgot password</h1>
      <p class="auth-sub">Enter your email and we'll send you a reset link.</p>

      <div id="msg" class="form-msg hidden"></div>

      <form id="forgotForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="username" required placeholder="you@example.com" />
        </div>
        <button id="submitBtn" type="submit" class="btn btn-primary">Send reset link</button>
      </form>

      <div class="auth-foot">
        <a href="/">← Back to sign in</a>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('forgotForm');
    const msg  = document.getElementById('msg');
    const btn  = document.getElementById('submitBtn');

    function showMsg(text, kind) { msg.textContent = text; msg.className = 'form-msg ' + kind; }
    function hideMsg() { msg.className = 'form-msg hidden'; }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMsg();
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        const res = await fetch('/api/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          showMsg(data.error || 'Request failed', 'error');
          btn.disabled = false;
          btn.textContent = 'Send reset link';
          return;
        }
        showMsg('If an account exists for that email, a reset link is on its way. Check your inbox.', 'success');
        form.querySelector('input').value = '';
        btn.textContent = 'Sent';
      } catch (err) {
        showMsg('Network error. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
