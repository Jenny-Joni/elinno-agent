<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Set new password — Elinno Agent</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="/auth.css" />
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <p class="auth-eyebrow">Elinno Agent</p>
      <span class="auth-eyebrow-line"></span>
      <h1 class="auth-heading">Set new password</h1>
      <p class="auth-sub">Choose a new password (at least 8 characters).</p>

      <div id="msg" class="form-msg hidden"></div>

      <form id="resetForm" novalidate>
        <div class="field">
          <label for="password">New password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8" />
        </div>
        <div class="field">
          <label for="confirm">Confirm password</label>
          <input id="confirm" name="confirm" type="password" autocomplete="new-password" required minlength="8" />
        </div>
        <button id="submitBtn" type="submit" class="btn btn-primary">Update password</button>
      </form>

      <div class="auth-foot">
        <a href="/">← Back to sign in</a>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const token  = params.get('token') || '';
    const form   = document.getElementById('resetForm');
    const msg    = document.getElementById('msg');
    const btn    = document.getElementById('submitBtn');

    function showMsg(text, kind) { msg.textContent = text; msg.className = 'form-msg ' + kind; }
    function hideMsg() { msg.className = 'form-msg hidden'; }

    if (!token) {
      showMsg('This reset link is missing or invalid. Request a new one.', 'error');
      btn.disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMsg();
      const pw  = document.getElementById('password').value;
      const pw2 = document.getElementById('confirm').value;
      if (pw.length < 8) return showMsg('Password must be at least 8 characters.', 'error');
      if (pw !== pw2)   return showMsg('Passwords do not match.', 'error');

      btn.disabled = true;
      btn.textContent = 'Updating…';
      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pw }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showMsg(data.error || 'Reset failed', 'error');
          btn.disabled = false;
          btn.textContent = 'Update password';
          return;
        }
        showMsg('Password updated. Redirecting to sign-in…', 'success');
        setTimeout(() => location.replace('/'), 1500);
      } catch (err) {
        showMsg('Network error. Please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Update password';
      }
    });
  </script>
</body>
</html>
